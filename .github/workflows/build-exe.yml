name: Build EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Opt into Node 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install opencv-python numpy pillow tkinterdnd2 pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller FastWatermark.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastWatermark
          path: dist/FastWatermark.exe
          retention-days: 7

      - name: Create Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FastWatermark.exe
          generate_release_notes: true
